<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greg Hernández - Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Evita el scroll horizontal y toques accidentales */
        body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .profile-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-28 h-28 rounded-full bg-white p-1 profile-shadow mb-4">
                <img src="profile.jpg" alt="Greg" class="w-full h-full rounded-full object-cover">
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Greg Hernández</h1>
            <p class="text-slate-500 font-medium">Software Developer | Android Native | Compose Multiplatform</p>
        </div>

        <div class="w-full max-w-sm space-y-4">
            
            <a href="https://github.com/GregHdezQroMx" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-[#0077b5] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
               <span>LinkedIn</span>
            </a>

            <a href="https://sites.google.com/view/greg-hdez-mx-qro/inicio?authuser=0" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-white border-2 border-slate-200 text-slate-800 rounded-2xl font-bold shadow-sm active:scale-95 transition-transform">
               <span>Project's Portfolio</span>
            </a>

            <a href="https://github.com/GregHdezQroMx" target="_blank" 
               class="flex items-center justify-center w-full py-4 px-6 bg-[#24292e] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
               <span>GitHub Profile</span>
            </a>

        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>© 2026 • San Juan del río Querétaro, México</p>
        </footer>

    </div>

</body>
</html>
